version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock)
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used in workflows (.github/workflows/*)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions-all:
        patterns:
          - "*"
